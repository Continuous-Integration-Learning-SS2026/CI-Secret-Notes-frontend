<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <section id="create-section" class="fixed-header">
            <h1>Secret Notes</h1>
            <form id="create-form">
                <div class="row">
                    <div class="input-group">
                        <label for="note-title">Title:</label>
                        <input type="text" id="note-title" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="note-key">Key:</label>
                        <div class="password-wrapper">
                            <input type="password" id="note-key" required>
                            <span class="toggle-password" role="button">Show</span>
                        </div>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="note-content">Note:</label>
                    <textarea id="note-content" rows="2" required></textarea>
                </div>
                
                <button type="submit" class="primary-btn">Create New Note</button>
            </form>
        </section>

        <section id="notes-list-section" class="scrollable-content">
        </section>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
